<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./Css/calculater.css" />
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <div class="display">
          <p class="display-label">Smart Calculator</p>
          <div id="output">0</div>
          <div id="answer">Ready</div>
        </div>
      <table>
        <tr>
          <td class="number" id="7">7</td>
          <td class="number" id="8">8</td>
          <td class="number" id="9">9</td>
          <td class="action" id="C">Clear</td>
          <td class="action action-delete" id="AC">Del</td>
        </tr>
        <tr>
          <td class="number" id="4">4</td>
          <td class="number" id="5">5</td>
          <td class="number" id="6">6</td>
          <td class="operator" id="+">+</td>
          <td class="operator" id="*">&times;</td>
        </tr>
        <tr>
          <td class="number" id="1">1</td>
          <td class="number" id="2">2</td>
          <td class="number" id="3">3</td>
          <td class="operator" id="-">-</td>
          <td class="operator" id="/">&#247;</td>
        </tr>
        <tr>
          <td class="number" id="0">0</td>
          <td class="number" id=".">.</td>
          <td class="operator" id="^">x<sup>y</sup></td>
          <td class="equals" colspan="2" id="=">=</td>
        </tr>
      </table>
      </div>
    </div>
    <script src="./Js/calculater.js"></script>
  </body>
</html>
